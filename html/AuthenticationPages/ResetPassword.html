<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Reset Password</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=reset_focus" />
    <link rel="stylesheet" href="../../css/Reset.css" />
</head>
<body>
<div class="container">
    <div class="left">
        <div class="sidebar-content">
            <div class="logo">
                <img src="../../images/logo.png" alt="TaskFlow Logo">
                <h3>TaskFlow</h3>
            </div>
            <div class="footer">
                <h2>Streamline your workflow<br><span>Focus on what matters most.</span></h2>
            </div>
        </div>
    </div>
    <div class="right">
        <div class="form-wrapper">
            <span class="material-symbols-outlined">reset_focus</span>
            <div class="description">
                <h3>Reset your password</h3>
                <p>Enter the email address associated with your account, and we'll send you a link to reset your password</p>
            </div>

            <form id="resetForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-primary" id="resetBtn">
                        <span class="btn-text">Send Reset Link</span>
                        <div class="spinner"></div>
                    </button>

                    <a href="LoginPage.html" class="btn-secondary">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../../js/ResetPassword.js" type="module"></script>
</body>
</html>
