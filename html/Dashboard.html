<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="../../css/Dashboard.css">
</head>
<body>
<div class="container">
    <div class="left">
        <div class="logo">
            <img src="/images/logo.png" alt="Logo">
            <div class="text">
                <h3>TaskMaster</h3>
                <p>Workspace v2.0</p>
            </div>
        </div>
        <div class="menu">
            <ul>
                <li id="filter-today" class="active"><span class="material-symbols-outlined">calendar_today</span>Today</li>
                <li id="filter-upcoming"><span class="material-symbols-outlined">event_upcoming</span>Upcoming</li>
                <li id="filter-completed"><span class="material-symbols-outlined">task_alt</span>Completed</li>
            </ul>
        </div>
        <div class="bottom">
            <div class="user">
                <span class="material-symbols-outlined symbol">person</span>
                <p id="user-display-name">Loading...</p>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="topnav">
            <input type="text" placeholder="Search tasks..." id="search-input">
            <div class="icons">
                <span class="material-symbols-outlined">notifications</span>
                <span class="material-symbols-outlined" id="logout">logout</span>
            </div>
        </div>

        <div class="heading">
            <h3 id="current-filter-title">Today's Tasks</h3>
        </div>

        <div class="task-container" id="task-container"></div>

        <span class="material-symbols-outlined" id="addtask">add</span>

        <div id="popup" class="popup">
            <div class="popup-content">
                <span id="close" class="material-symbols-outlined">close</span>
                <div class="heading2">
                    <span class="material-symbols-outlined">check_circle</span>
                    <p>Drafting New Task</p>
                </div>
                <div class="input-group">
                    <label>Task Title</label>
                    <input type="text" class="task-input" placeholder="Task name">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Enter details"></textarea>
                </div>
                <div class="input-group">
                    <label>Due Date & Time</label>
                    <div style="display:flex; gap:10px;">
                        <input type="date" class="due-date" style="flex:2;">
                        <input type="time" id="appt" style="flex:1;">
                    </div>
                </div>
                <button class="add-task-btn">Add Task</button>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script type="module" src="../js/main.js"></script>
</body>
</html>
